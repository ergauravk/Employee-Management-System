{% extends 'base.html' %}

{% block title %}Add Employee — Employee{% endblock %}

{% block content %}
  <div class="py-3">
    <h2>Add Employee</h2>
    <p class="text-muted">Fill out the employee details below.</p>
    <form action="{% url 'add_emp' %}" method="POST" class="row g-3">
      {% csrf_token %}
      <div class="col-md-6">
        <label for="first_name" class="form-label">First Name</label>
        <input type="text" value="{{ first_name }}" name="first_name" class="form-control" id="first_name" />
      </div>
      <div class="col-md-6">
        <label for="last_name" class="form-label">Last Name</label>
        <input type="text" value="{{ last_name }}" name="last_name" class="form-control" id="last_name" />
      </div>
      <div class="col-md-4">
        <label for="salary" class="form-label">Salary</label>
        <input type="text" value="{{ salary }}" name="salary" class="form-control" id="salary" />
      </div>
      <div class="col-md-4">
        <label for="dept" class="form-label">Department</label>
        <input type="text" value="{{ dept }}" name="dept" class="form-control" id="dept" />
      </div>
      <div class="col-md-4">
        <label for="role" class="form-label">Role</label>
        <input type="number" value="{{ role }}" name="role" class="form-control" id="role" />
      </div>
      <div class="col-md-6">
        <label for="phone" class="form-label">Phone</label>
        <input type="number" value="{{ phone }}" name="phone" class="form-control" id="phone" />
      </div>
      <div class="col-md-6">
        <label for="hire_data" class="form-label">Hire Date</label>
        <input type="date" value="{{ hire_data }}" name="hire_data" class="form-control" id="hire_date" />
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Submit</button>
      </div>
    </form>
  </div>
{% endblock %}
